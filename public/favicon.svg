<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gMain" x1="20%" y1="80%" x2="80%" y2="10%">
      <stop offset="0%" stop-color="#1d7a0e"/>
      <stop offset="60%" stop-color="#2dbb12"/>
      <stop offset="100%" stop-color="#4eed28"/>
    </linearGradient>
    <linearGradient id="gArrow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22991a"/>
      <stop offset="100%" stop-color="#5cf535"/>
    </linearGradient>
  </defs>

  <!-- Speed lines left -->
  <line x1="3"  y1="41" x2="17" y2="41" stroke="url(#gMain)" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="6"  y1="49" x2="17" y2="49" stroke="url(#gMain)" stroke-width="2.3" stroke-linecap="round"/>
  <line x1="9"  y1="57" x2="17" y2="57" stroke="url(#gMain)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Chat bubble (WhatsApp style) -->
  <path d="M20 32 Q20 22 30 22 L62 22 Q72 22 72 32 L72 58 Q72 68 62 68 L44 68 L34 80 L34 68 L30 68 Q20 68 20 58 Z"
        fill="url(#gMain)"/>

  <!-- W inside bubble -->
  <polyline
    points="30,38 35,60 43,44 51,60 56,38"
    fill="none"
    stroke="white"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Big circular arc around the logo -->
  <path d="M 18 68 A 40 40 0 1 1 78 30"
        fill="none"
        stroke="url(#gArrow)"
        stroke-width="6"
        stroke-linecap="round"/>

  <!-- Arrowhead pointing up-right -->
  <polyline
    points="63,22 80,28 76,46"
    fill="none"
    stroke="url(#gArrow)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>
